services:
  hours-dashboard-dept:
    build: .
    container_name: hours-dashboard-dept
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=5180
      - DATABASE_URL=${DATABASE_URL}
      - GITLAB_URL=${GITLAB_URL}
      - GITLAB_TOKEN=${GITLAB_TOKEN}
      - ALLOWED_DEPTS=AIжЉЂиЎ“жњЌе‹™йѓЁ,AIй›Із«ЇжњЌе‹™йѓЁ
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5180/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
