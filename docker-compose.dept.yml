services:
  hours-dashboard-cloud:
    build: .
    container_name: hours-dashboard-cloud
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=5182
      - DATABASE_URL=${DATABASE_URL}
      - GITLAB_URL=${GITLAB_URL}
      - GITLAB_TOKEN=${GITLAB_TOKEN}
      - ALLOWED_DEPTS=AI雲端服務部
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5182/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
